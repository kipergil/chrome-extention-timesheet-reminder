<div id="timesheet-reminder-modal" class="timesheet-reminder-modal">
  <div class="timesheet-reminder-overlay"></div>
  <div class="timesheet-reminder-content" role="dialog" aria-modal="true" aria-live="assertive">
    <h2 class="timesheet-reminder-title">Reminder</h2>
    <p class="timesheet-reminder-message" id="timesheetReminderMessage"></p>
    <div class="timesheet-reminder-buttons">
      <button type="button" class="timesheet-reminder-btn acknowledge-btn" id="timesheetAcknowledgeBtn">Acknowledge</button>
      <button type="button" class="timesheet-reminder-btn snooze-btn" id="timesheetSnoozeBtn">Snooze (15 min)</button>
      <button type="button" class="timesheet-reminder-btn open-timesheet-btn" id="timesheetOpenBtn">Open Timesheet</button>
    </div>
  </div>
</div>
